<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ANALOG IMPERIUM — SETTINGS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050e05;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: 480px;
      border: 1px solid rgba(0, 255, 65, 0.25);
      box-shadow: 0 0 30px rgba(0, 255, 65, 0.08), inset 0 0 40px rgba(0, 255, 65, 0.04);
      background: rgba(2, 27, 21, 0.95);
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-header h1 {
      font-size: 10px;
      letter-spacing: 4px;
      color: #00ff41;
      text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
      font-weight: normal;
      text-transform: uppercase;
    }

    .panel-header span {
      font-size: 8px;
      color: rgba(0, 255, 65, 0.4);
      letter-spacing: 2px;
    }

    .panel-body {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .setting-label {
      font-size: 8px;
      letter-spacing: 3px;
      color: rgba(255, 179, 0, 0.8);
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(255, 179, 0, 0.4);
    }

    .setting-desc {
      font-size: 8px;
      letter-spacing: 1px;
      color: rgba(0, 255, 65, 0.35);
      line-height: 1.6;
    }

    .setting-input {
      background: transparent;
      border: 1px solid rgba(255, 179, 0, 0.35);
      color: #ffb300;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      caret-color: #ffb300;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .setting-input::placeholder {
      color: rgba(255, 179, 0, 0.25);
    }

    .setting-input:focus {
      border-color: rgba(255, 179, 0, 0.85);
      box-shadow: 0 0 12px rgba(255, 179, 0, 0.15);
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, rgba(0, 255, 65, 0.15), transparent);
    }

    /* Signum model selector */
    .model-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .model-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 10px;
      border: 1px solid rgba(0, 255, 65, 0.12);
      transition: border-color 0.2s, background 0.2s;
    }

    .model-option:hover {
      border-color: rgba(0, 255, 65, 0.4);
      background: rgba(0, 255, 65, 0.04);
    }

    .model-option input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(0, 255, 65, 0.5);
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
    }

    .model-option input[type="radio"]:checked {
      border-color: #00ff41;
      background: #00ff41;
      box-shadow: 0 0 6px rgba(0, 255, 65, 0.8);
    }

    .model-option-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0, 255, 65, 0.7);
      text-transform: uppercase;
    }

    .model-option input[type="radio"]:checked + .model-option-label {
      color: #00ff41;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.6);
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-save {
      background: transparent;
      border: 1px solid rgba(0, 255, 65, 0.45);
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      padding: 9px 22px;
      cursor: pointer;
      text-transform: uppercase;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.08);
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
    }

    .btn-save:hover {
      border-color: rgba(0, 255, 65, 0.9);
      box-shadow: 0 0 14px rgba(0, 255, 65, 0.3);
      color: #fff;
    }

    #status {
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(0, 255, 65, 0.0);
      text-transform: uppercase;
      transition: color 0.3s;
    }

    #status.visible {
      color: rgba(0, 255, 65, 0.7);
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h1>Analog Imperium</h1>
      <span>// SETTINGS</span>
    </div>
    <div class="panel-body">

      <div class="setting-group">
        <div class="setting-label">Open Codex — Target URL</div>
        <div class="setting-desc">
          URL to open when the + OPEN CODEX button is pressed.<br>
          Leave blank to open a plain incognito tab.
        </div>
        <input class="setting-input" id="codex-url" type="text"
               placeholder="https://example.com" spellcheck="false" autocomplete="off" />
      </div>

      <div class="divider"></div>

      <div class="setting-group">
        <div class="setting-label">Signum — 3D Object</div>
        <div class="setting-desc">
          The hologram model displayed in the SIGNUM module.<br>
          Change takes effect on next panel open.
        </div>
        <div class="model-options">
          <label class="model-option">
            <input type="radio" name="signumModel" value="imperium" id="model-imperium" />
            <span class="model-option-label">Imperium Aquila Signum</span>
          </label>
          <label class="model-option">
            <input type="radio" name="signumModel" value="bolter" id="model-bolter" />
            <span class="model-option-label">Astartes Bolter</span>
          </label>
          <label class="model-option">
            <input type="radio" name="signumModel" value="templars" id="model-templars" />
            <span class="model-option-label">Black Templars Cross</span>
          </label>
          <label class="model-option">
            <input type="radio" name="signumModel" value="inquisitor" id="model-inquisitor" />
            <span class="model-option-label">Inquisitor — Ordo Malleus</span>
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="btn-row">
        <button class="btn-save" id="btn-save">SAVE SETTINGS</button>
        <span id="status">COGITATOR UPDATED</span>
      </div>

    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
